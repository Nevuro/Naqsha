<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Luxury Wedding</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

.hero{
  height:100vh;
  background:url('{{BG}}') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.hero h1{
  font-size:4rem;
  color:#fff;
}

.section{
  padding:80px 20px;
  text-align:center;
}

.names{
  font-size:3rem;
  color:#ff4d6d;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
  transition:0.4s;
}

.gallery img:hover{
  transform:scale(1.1);
}

/* floating hearts */
.heart{
  position:fixed;
  bottom:-10px;
  color:#ff4d6d;
  animation:float 5s linear infinite;
}

@keyframes float{
  0%{transform:translateY(0);}
  100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="hero">
  <h1>You're Invited</h1>
  <p>💍 Wedding Celebration</p>
</div>

<div class="section">
  <div class="names">Mohamed ❤️ Sarah</div>
  <p>05/05/2026 | 5:00 PM</p>
  <p>Royal Hall, Cairo</p>
</div>

<div class="section gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
</div>

<script>
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},500);
</script>

</body>
</html>
