<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wedding</title>

<style>
body{
  font-family:Arial;
  background:#ffe6ea;
}

.card{
  background:white;
  padding:40px;
  margin:60px auto;
  width:80%;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.names{
  font-size:2.5rem;
  color:#ff4d6d;
}

.gallery img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

<div class="names">Mohamed ❤️ Sarah</div>

<p>12/12/2026 | 05:00 PM</p>
<p>Hall Banquet, cairo</p>

<img src="img3.jpg" style="width:100%;border-radius:15px;">

<div class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
</div>

</div>

</body>
</html>
