<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Playfair Display',serif;
  background:#111;
  color:white;
}

/* SECTION */
.section{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

/* BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.5);
}

/* OVERLAY */
.overlay{
  position:relative;
  z-index:2;
  max-width:700px;
  padding:30px;
  background:rgba(0,0,0,0.4);
  border-radius:20px;
  backdrop-filter:blur(10px);
}

    .heart{
      position:fixed;
      bottom:-20px;
      color:#ff4d6d;
      font-size:18px;
      animation:floatUp 5s linear;
      opacity:0.7;
    }


/* TEXT */
.title{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  margin-bottom:10px;
}

.names{
  font-family:'Great Vibes',cursive;
  font-size:3rem;
  color:#ff4d6d;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:40px;
}

.gallery img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:10px;
  transition:0.5s;
}

.gallery img:hover{
  transform:scale(1.05);
}

    .heart{
      position:fixed;
      bottom:-20px;
      color:#ff4d6d;
      font-size:18px;
      animation:floatUp 5s linear;
      opacity:0.7;
    }

</style>
</head>

<body>

<!-- HERO -->
<div class="section">
  <div class="bg" style="background-image:url('{{BG}}')"></div>
  <div class="overlay">
    <div class="title">You're Invited</div>
  </div>
</div>

<!-- INFO -->
<div class="section">
  <div class="bg" style="background-image:url('{{BG}}')"></div>
  <div class="overlay">
    <div class="names">Mohamed ❤️ Sarah</div>
    <p>2023-10-15 | 18:00</p>
    <p>Royal Hall, Cairo</p>
  </div>
</div>

<!-- GALLERY -->
<div class="section">
  <div class="overlay">
    <div class="gallery">
      <img src="img1.jpg">
      <img src="img2.jpg">
      <img src="img3.jpg">
    </div>
  </div>
</div>
<script>
setInterval(()=>{
  let h=document.createElement('div');
  h.className='heart';
  h.innerHTML='❤';
  h.style.left=Math.random()*100+'vw';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},400);
</script>
</body>
</html>
