<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Preview Switcher</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
}

/* layout */
.app{
  display:grid;
  grid-template-columns:300px 1fr;
  height:100vh;
}

/* sidebar */
.sidebar{
  background:#111;
  padding:15px;
  overflow:auto;
  border-right:1px solid #222;
}

.file{
  padding:10px;
  margin:5px 0;
  background:#1c1c1c;
  border-radius:8px;
  cursor:pointer;
}

.file:hover{
  background:#d4af37;
  color:black;
}

/* preview stage */
.stage{
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle,#1a1a1a,#000);
}

/* iphone frame */
.iphone{
  width:380px;
  height:780px;
  background:#111;
  border-radius:55px;
  padding:14px;
  box-shadow:0 40px 120px rgba(0,0,0,.8);
  position:relative;
}

.notch{
  width:160px;
  height:25px;
  background:#000;
  border-radius:0 0 15px 15px;
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
}

.screen{
  width:100%;
  height:100%;
  border-radius:45px;
  overflow:hidden;
  background:white;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="app">

<!-- FILE LIST -->
<div class="sidebar">
  <h3>📁 Themes</h3>

  <div class="file" onclick="load('luxury.html')">💎 Luxury</div>
  <div class="file" onclick="load('engagement.html')">💍 Engagement</div>
  <div class="file" onclick="load('classic.html')">🌸 Classic</div>
  <div class="file" onclick="load('minimal.html')">⚪ Minimal</div>

  <hr style="border:1px solid #222">

  <input type="file" id="upload" accept=".html">
</div>

<!-- PREVIEW -->
<div class="stage">

  <div class="iphone">
    <div class="notch"></div>
    <div class="screen">
      <iframe id="frame"></iframe>
    </div>
  </div>

</div>

</div>

<script>

/* =========================
LOAD LOCAL FILE
========================= */
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(){
    document.getElementById("frame").srcdoc = reader.result;
  };

  reader.readAsText(file);
});

/* =========================
LOAD PRESET FILES
========================= */
function load(file){
  fetch(file)
    .then(res => res.text())
    .then(html => {
      document.getElementById("frame").srcdoc = html;
    })
    .catch(err => {
      alert("Cannot load file: " + file);
    });
}

/* default */
load("luxury.html");

</script>

</body>
</html>
