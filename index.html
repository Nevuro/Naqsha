<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Invite Tabs</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

/* Main Layout */
.container{
    display:flex;
    flex-direction:column;
    height:100vh;
    width:100%;
}

/* Tabs */
.tabs{
    display:flex;
    overflow-x:auto;
    background:#b8860b;
    scrollbar-width:none;
}

.tabs::-webkit-scrollbar{
    display:none;
}

.tab{
    flex:1;
    min-width:120px;
    text-align:center;
    padding:14px 10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
    user-select:none;
    white-space:nowrap;
}

.tab:hover{
    background:#a67c00;
}

.tab.active{
    background:white;
    color:#b8860b;
}

/* Content */
.viewer{
    flex:1;
    position:relative;
    overflow:hidden;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    background:white;
}

/* Mobile */
@media (max-width:600px){

    .tab{
        font-size:14px;
        padding:12px 8px;
        min-width:100px;
    }

}
</style>
</head>

<body>

<div class="container">

    <div class="tabs">
        <div class="tab active"
             onclick="showTab('invite1.html', this)">
             Basic
        </div>

        <div class="tab"
             onclick="showTab('invite2.html', this)">
             Luxury
        </div>

        <div class="tab"
             onclick="showTab('invite3.html', this)">
             Cinematic
        </div>

        <div class="tab"
             onclick="showTab('invite4.html', this)">
             Ultra
        </div>
    </div>

    <div class="viewer">
        <iframe id="frame" src="invite1.html"></iframe>
    </div>

</div>

<script>
function showTab(file, el){

    document.getElementById("frame").src = file;

    document.querySelectorAll(".tab")
    .forEach(tab => tab.classList.remove("active"));

    el.classList.add("active");
}
</script>

</body>
</html>
