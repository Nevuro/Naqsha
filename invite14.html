<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Luxury Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    color:#fff;
    overflow-x:hidden;
    background:url("https://images.unsplash.com/photo-1529634894406-3c1a3a3b0f2a?auto=format&fit=crop&w=1600&q=80") center/cover fixed;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,.85),rgba(0,0,0,.95));
}

/* SECTIONS */
.section{
    position:relative;
    z-index:2;
    max-width:900px;
    margin:80px auto;
    padding:45px;
    background:rgba(10,10,10,0.55);
    border:1px solid rgba(255,215,0,0.2);
    border-radius:24px;
    backdrop-filter:blur(14px);
}

/* TITLE */
h1{
    font-family:"Playfair Display";
    font-size:54px;
    text-align:center;
    color:gold;
}

.hearts {
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
.heart {
    position:absolute;
    bottom:-20px;
    color:rgba(255,215,0,0.4);
    animation: floatUp linear infinite;
}
@keyframes floatUp {
    to {
        transform: translateY(-120vh);
        opacity:0;
    }
}


/* COUNTDOWN */
.countdown{
    display:flex;
    justify-content:center;
    gap:12px;
}
.box{
    padding:12px;
    min-width:75px;
    background:rgba(255,255,255,0.05);
    border:1px solid gold;
    text-align:center;
    border-radius:12px;
}

/* ALBUM GALLERY */
.album{
    display:flex;
    flex-direction:column;
    gap:25px;
}

.page{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,215,0,0.25);
    padding:15px;
    border-radius:18px;
    transform:rotateX(2deg);
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
    transition:0.5s;
}

.page:hover{
    transform:scale(1.02);
}

.page img{
    width:100%;
    border-radius:14px;
}

.caption{
    text-align:center;
    margin-top:10px;
    color:#ddd;
    font-size:14px;
}
.map-card{
    padding:20px;
    border-radius:18px;
    border:1px solid rgba(255,215,0,.2);
}
button{
    margin-top:15px;
    padding:12px 22px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,gold,#fff3b0,gold);
    cursor:pointer;
}
</style>
</head>

<body>

<div class="section">
    <h1>You're Invited 💍</h1>
    <p style="text-align:center;">Ahmed & Sarah</p>
</div>

<div class="section">
    <div class="countdown">
        <div class="box"><div id="d"></div>Days</div>
        <div class="box"><div id="h"></div>Hours</div>
        <div class="box"><div id="m"></div>Min</div>
        <div class="box"><div id="s"></div>Sec</div>
    </div>
</div>
<div class="hearts" id="hearts"></div>

<!-- ALBUM GALLERY -->
<div class="section">
    <h2 style="text-align:center;color:gold;">Our Memories Album</h2>

    <div class="album">
        <div class="page">
            <img src="img1.jpg">
            <div class="caption">First moment together</div>
        </div>

        <div class="page">
            <img src="img2.jpg">
            <div class="caption">A beautiful memory</div>
        </div>

        <div class="page">
            <img src="img3.jpg">
            <div class="caption">Forever begins</div>
        </div>
    </div>
</div>

<div class="section map-card">
    <h2>📍 Location</h2>
    <p>Royal Hall, Cairo</p>

    <button onclick="openMap()">Open Google Maps</button>
</div>

<script>
// Countdown Timer
const target = new Date("July 20, 2026 20:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const diff = target - now;

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("d").innerText = days;
    document.getElementById("h").innerText = hours;
    document.getElementById("m").innerText = minutes;
    document.getElementById("s").innerText = seconds;
}, 1000);

// Map Button
function openMap(){
    window.open("https://www.google.com/maps/search/?api=1&query=Royal+Hall+Cairo");

}

function heart(){
    const h=document.createElement("div");
    h.classList.add("heart");
    h.innerHTML="❤";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(3+Math.random()*5)+"s";
    document.getElementById("hearts").appendChild(h);
    setTimeout(()=>h.remove(),8000);
}
setInterval(heart,500);
</script>

</body>
</html>
