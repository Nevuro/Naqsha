<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Playfair Display',serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* SECTION */
.section{
  height:100vh;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* CINEMATIC BACKGROUND */
.bg{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  filter:brightness(0.5);
  transform:scale(1.2);
  transition:transform 6s ease;
}

.section.active .bg{
  transform:scale(1);
}

/* CONTENT ANIMATION */
.content{
  position:relative;
  z-index:2;
  opacity:0;
  transform:translateY(50px);
  transition:1.2s ease;
}

.section.active .content{
  opacity:1;
  transform:translateY(0);
}

/* TEXT */
.title{
  font-family:'Great Vibes',cursive;
  font-size:4rem;
}

.names{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  color:#ff4d6d;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
  padding:40px;
}

.gallery img{
  width:100%;
  height:300px;
  object-fit:cover;
  transition:0.6s;
}

.gallery img:hover{
  transform:scale(1.1);
}

/* PARTICLES */
.heart{
  position:fixed;
  bottom:-10px;
  color:#ff4d6d;
  font-size:18px;
  animation:floatUp 6s linear;
}

@keyframes floatUp{
  100%{transform:translateY(-100vh);opacity:0;}
}

/* SCROLL SNAP */
html{
  scroll-snap-type:y mandatory;
}
.section{
  scroll-snap-align:start;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="section">
  <div class="bg" style="background-image:url('{{BG}}')"></div>
  <div class="content">
    <div class="title">You're Invited</div>
  </div>
</div>

<!-- NAMES -->
<div class="section">
  <div class="bg" style="background-image:url('{{BG}}')"></div>
  <div class="content">
    <div class="names">Mohamed ❤️ Sarah</div>
    <p>2023-10-15 | 18:00</p>
    <p>Royal Hall, Cairo</p>
  </div>
</div>

<!-- GALLERY -->
<div class="section">
  <div class="bg" style="background-image:url('{{BG}}')"></div>
  <div class="content gallery">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
  </div>
</div>

<script>
const sections = document.querySelectorAll(".section");

const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("active");
    }
  });
},{threshold:0.5});

sections.forEach(sec=>observer.observe(sec));

/* HEARTS */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},400);
</script>

</body>
</html>
