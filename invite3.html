<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Tier Engagement Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ================= BASE ================= */
body{
    margin:0;
    font-family:Poppins;
    color:#fff;
    overflow-x:hidden;
    background:url("https://images.unsplash.com/photo-1529634894406-3c1a3a3b0f2a?auto=format&fit=crop&w=1600&q=80")
    center/cover fixed;
}

/* CINEMATIC BACKDROP */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 30% 20%, rgba(255,215,0,0.12), transparent 45%),
        radial-gradient(circle at 70% 60%, rgba(255,255,255,0.05), transparent 50%),
        linear-gradient(180deg, rgba(0,0,0,0.88), rgba(0,0,0,0.94));
    z-index:0;
}

/* GOLD PARTICLES */
.particles{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}
.p{
    position:absolute;
    width:4px;
    height:4px;
    background:gold;
    border-radius:50%;
    opacity:.5;
    animation:float 8s linear infinite;
    box-shadow:0 0 10px gold;
}
@keyframes float{
    to{transform:translateY(-120vh);opacity:0;}
}

/* ================= CINEMATIC SCROLL EFFECT ================= */
.hero, .section{
    position:relative;
    z-index:2;
    opacity:0;
    transform:translateY(60px) scale(0.98);
    filter:blur(10px);
    transition:all 1.2s cubic-bezier(0.25,1,0.3,1);
}

.hero.show, .section.show{
    opacity:1;
    transform:translateY(0) scale(1);
    filter:blur(0);
}

/* STAGGER EFFECT */
.section:nth-child(odd){
    transition-delay:0.1s;
}
.section:nth-child(even){
    transition-delay:0.2s;
}

/* ================= HERO ================= */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-family: "Playfair Display";
    font-size: 60px;
    background: linear-gradient(90deg, #d4af37, #fff3b0, #d4af37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    color: transparent;
}
.hero .names{
    font-size:38px;
    color:#ffd700;
    margin-top:10px;
}

/* ================= SECTIONS ================= */
.section{
    max-width:850px;
    margin:70px auto;
    padding:40px;
    background:rgba(10,10,10,0.55);
    border:1px solid rgba(255,215,0,0.2);
    border-radius:22px;
    backdrop-filter:blur(12px);
}

/* ================= COUNTDOWN ================= */
.countdown{
    display:flex;
    justify-content:center;
    gap:10px;
}
.box{
    padding:10px;
    background:rgba(255,255,255,0.05);
    border-radius:10px;
    min-width:70px;
    text-align:center;
}

/* ================= GALLERY ================= */
.gallery{
    display:flex;
    flex-direction:column;
    gap:15px;
}
.gallery img{
    width:100%;
    border-radius:18px;
}

/* ================= VIDEO SECTION ================= */
.video-section{
    position:relative;
    overflow:hidden;
    border-radius:22px;
    border:1px solid rgba(255,215,0,0.2);
    background:rgba(10,10,10,0.55);
    padding:20px;
}
.video-section video{
    width:100%;
    border-radius:18px;
    display:block;
}

/* ================= MAP BUTTON ================= */
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:linear-gradient(90deg,#d4af37,#fff3b0,#d4af37);
    font-weight:bold;
    cursor:pointer;
}

/* ================= FOOTER ================= */
footer{
    text-align:center;
    padding:40px;
    opacity:.6;
}
footer span{color:gold;}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<!-- HERO -->
<div class="hero">
    <h1>You're Invited</h1>
    <div class="names">Mohamed & Sarah</div>
    <p>To celebrate a beautiful beginning</p>
</div>

<!-- DETAILS -->
<div class="section">
    <h2 style="text-align:center;">Engagement Details</h2>
    <p style="text-align:center;">20 July 2026 • 8:00 PM • Royal Hall, Cairo</p>

    <div class="countdown">
        <div class="box"><span id="d"></span><br>Days</div>
        <div class="box"><span id="h"></span><br>Hours</div>
        <div class="box"><span id="m"></span><br>Min</div>
        <div class="box"><span id="s"></span><br>Sec</div>
    </div>
</div>

<!-- VIDEO SECTION -->
<div class="section video-section">
    <h2 style="text-align:center;">Signature Video</h2>
    <video autoplay muted loop playsinline>
        <source src="vid.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<!-- GALLERY -->
<div class="section">
    <h2 style="text-align:center;">Our Moments</h2>
    <div class="gallery">
        <img src="img1.jpg">
        <img src="img2.jpg">
        <img src="img3.jpg">
        <img src="img4.jpg">
        <img src="img5.jpg">
    </div>
</div>

<!-- MAP -->
<div class="section" style="text-align:center;">
    <h2>📍 Location</h2>
    <p>Royal Hall, Cairo</p>

    <button onclick="openMap()">Open Google Maps</button>
</div>

<footer>
    Created by <span>Naqsha</span>
</footer>

<script>

/* ===== PARTICLES ===== */
function p(){
    const el=document.createElement("div");
    el.className="p";
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(4+Math.random()*6)+"s";
    document.getElementById("particles").appendChild(el);
    setTimeout(()=>el.remove(),8000);
}
setInterval(p,300);

/* ===== SCROLL ANIMATION ===== */
const elements=document.querySelectorAll('.hero, .section');

const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
},{threshold:0.15});

elements.forEach(el=>observer.observe(el));

/* ===== MAP ===== */
function openMap(){
    window.open("https://www.google.com/maps/search/?api=1&query=Royal+Hall+Cairo","_blank");
}

/* ===== COUNTDOWN ===== */
const t=new Date("July 20, 2026 20:00:00").getTime();

setInterval(()=>{
    let now=new Date().getTime();
    let d=t-now;

    document.getElementById("d").innerText=Math.floor(d/86400000);
    document.getElementById("h").innerText=Math.floor(d/3600000%24);
    document.getElementById("m").innerText=Math.floor(d/60000%60);
    document.getElementById("s").innerText=Math.floor(d/1000%60);
},1000);

</script>

</body>
</html>
